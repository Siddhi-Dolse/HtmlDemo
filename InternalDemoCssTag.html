<html>
    <head>
        <title>Internal CSS Tag Selector</title>
        <style>
            p{ color:red;
                font-size:30px;
                font-family:cursive;
            }
            div{
                color:blue;
                background-color:yellow;
                text-align:center;
                text-decoration:underline;
                font-size:40px;
            }
            h1{
                color:pink;
                background-color:Brown;
                text-align:right;
                text-size:50px;
            }
            h2{
             color:yellowgreen;
                background-color:purple;
                text-align:left;
                text-size:50px;   
            }

        </style>
    </head>
    <body>
        <p>Paragraph_1</p>
        <p>Paragraph_2</p>
        <div>Divide Tag</div>
        <h1>Hello</h1>
        <h1>Hello</h1>
        <h2>Hello</h2>
        <h2>Hello</h2>

    </body>
</html>
