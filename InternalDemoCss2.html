<html>
    <head>
        <title>Internal CSS 2</title>
        <style>
            #r{
                color:red;
                font-size:20px;
                text-align:left;
                background-color:yellow;
            }
            #g{
                color:green;
                font-size:30px;
                text-align:center;
                background-color:pink;
            }
            #b{
                color:blue;
                font-size:40px;
                text-align:right;
                background-color:yellow;
            }
        </style>
    </head>
    <body>
        <p id="r">Hello</p>
        <p id="g">Hello</p>
        <p id="b">Hello</p>
    </body>

</html>
