<html>
    <head>
        <title>Internal Css Combinator</title>
        <style>
            /*select all sibling elements*/
            h2~p{
                color:red;
            }

        </style>
    </head>
    <body>
        <h2>Header 2</h2>
        <p>Hello1</p>
        <p>Hello2</p>
        <p>Hello3</p>
        <div>Div Tag</div>
        <p>Hello4</p>

    </body>
</html>
