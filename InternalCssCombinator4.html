<html>
    <head>
        <title>Css Combinator</title>
    </head>
    <style>
        h1+p{
            color:rgb(242, 0, 255);
        }
        div +h2{
            color:rgb(186, 186, 0);

        }

    </style>
    <body>
        <h1>Header 1</h1>
        <p>Hello</p>
        <p>Hello</p>
        <div>Div Tag</div>
        <h2>Header 2</h2>
        <h2>Header 2</h2>
    </body>
</html>
