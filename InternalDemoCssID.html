<html>
    <head>
        <title>Internal CSS ID Selector</title>
        <style>
            #r{
                color:red;
                font-size:20px;
                text-align:left;
                background-color:yellow;
                font-family:cursive;
            }
            #g{
                color:rgb(39, 34, 194);
                font-size:40px;
                text-align:center;
                background-color:pink;
                text-decoration:underline;
            }
            #b{
                color:rgb(242, 255, 0);
                font-size:50px;
                text-align:right;
                background-color:rgb(162, 4, 154);
                text-decoration:overline;
            }
        </style>
    </head>
    <body>
        <p id="r">Red Rose</p>
        <p id="g">Blue Rose</p>
        <p id="b">Yellow Rose</p>
    </body>

</html>
